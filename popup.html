<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0366d6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #0256c2;
    }
    .info {
      margin-top: 15px;
      padding: 10px;
      background: #f6f8fa;
      border-radius: 6px;
      font-size: 12px;
      color: #586069;
    }
  </style>
</head>
<body>
  <h1>Diff-Focus</h1>
  <p>Navigate to a GitHub Pull Request to analyze diffs.</p>
  <button id="analyzeBtn">Analyze Current PR</button>
  <div class="info">
    This extension analyzes code diffs on GitHub PR pages and displays context cards with risk assessment.
  </div>
  <script src="popup.js"></script>
</body>
</html>
